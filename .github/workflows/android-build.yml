name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Read app version
        id: vars
        run: |
          version=$(node -p "require('./app.json').expo.version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag_check
        run: |
          tag="v${{ steps.vars.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Release skipped::Release $tag already exists, so no new release will be published. Bump \"version\" in app.json to publish one. The APK is available as a workflow artifact only."
            {
              echo "### ⚠️ No release published"
              echo ""
              echo "Release \`$tag\` already exists, so the release step was skipped."
              echo "The APK is attached to this run as an **artifact** only."
              echo ""
              echo "To publish a release, bump \`version\` in \`app.json\` and push again."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             "dist/music-festival-scheduler-v${{ steps.vars.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.sha_short }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: v${{ steps.vars.outputs.version }}
          body: |
            Automated APK build for version ${{ steps.vars.outputs.version }} (commit ${{ github.sha }}).
          files: dist/*.apk
          generate_release_notes: true
